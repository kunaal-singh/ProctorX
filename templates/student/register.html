{% extends "base.html" %}
{% block title %}Student Registration — AI Exam Proctor{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="glass-card p-5 auth-card">
                <div class="text-center mb-4">
                    <div class="auth-icon mb-3">
                        <i class="bi bi-person-plus-fill display-3 text-accent"></i>
                    </div>
                    <h3 class="fw-bold">Student Registration</h3>
                    <p class="text-muted small">Create your account to get started</p>
                </div>

                <form method="POST" action="{{ url_for('auth.student_register') }}" id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-person me-1"></i>Full Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" name="full_name" class="form-control glass-input"
                                   placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-envelope me-1"></i>Email <span class="text-danger">*</span>
                            </label>
                            <input type="email" name="email" class="form-control glass-input"
                                   placeholder="student@example.com" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" name="password" id="regPassword"
                                   class="form-control glass-input" placeholder="Min 6 characters"
                                   minlength="6" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock-fill me-1"></i>Confirm Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" name="confirm_password" id="regConfirmPassword"
                                   class="form-control glass-input" placeholder="Re-enter password"
                                   minlength="6" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-telephone me-1"></i>Phone
                            </label>
                            <input type="text" name="phone" class="form-control glass-input"
                                   placeholder="+91 9876543210">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-building me-1"></i>Department
                            </label>
                            <select name="department" class="form-select glass-input">
                                <option value="">Select Department</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Information Technology">Information Technology</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Electrical">Electrical</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Civil">Civil</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-calendar me-1"></i>Semester
                            </label>
                            <select name="semester" class="form-select glass-input">
                                <option value="">Select Semester</option>
                                <option value="1st">1st Semester</option>
                                <option value="2nd">2nd Semester</option>
                                <option value="3rd">3rd Semester</option>
                                <option value="4th">4th Semester</option>
                                <option value="5th">5th Semester</option>
                                <option value="6th">6th Semester</option>
                                <option value="7th">7th Semester</option>
                                <option value="8th">8th Semester</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill py-3 mt-2">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">
                        Already have an account?
                        <a href="{{ url_for('auth.student_login') }}" class="text-accent text-decoration-none fw-medium">
                            Sign In
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
