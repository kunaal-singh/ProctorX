{% extends "base.html" %}
{% block title %}Student Login — AI Exam Proctor{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 auth-card">
                <div class="text-center mb-4">
                    <div class="auth-icon mb-3">
                        <i class="bi bi-mortarboard-fill display-3 text-accent"></i>
                    </div>
                    <h3 class="fw-bold">Student Login</h3>
                    <p class="text-muted small">Sign in to access your exams</p>
                </div>

                <form method="POST" action="{{ url_for('auth.student_login') }}" id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-medium">
                            <i class="bi bi-envelope me-1"></i>Email Address
                        </label>
                        <input type="email" name="email" class="form-control form-control-lg glass-input"
                               placeholder="student@example.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">
                            <i class="bi bi-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" name="password" id="loginPassword"
                                   class="form-control form-control-lg glass-input"
                                   placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('loginPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill py-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">
                        Don't have an account?
                        <a href="{{ url_for('auth.student_register') }}" class="text-accent text-decoration-none fw-medium">
                            Register Now
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
