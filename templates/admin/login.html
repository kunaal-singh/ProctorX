{% extends "base.html" %}
{% block title %}Admin Login — AI Exam Proctor{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 auth-card">
                <div class="text-center mb-4">
                    <div class="auth-icon mb-3">
                        <i class="bi bi-person-gear display-3 text-accent"></i>
                    </div>
                    <h3 class="fw-bold">Admin Login</h3>
                    <p class="text-muted small">Access the administration panel</p>
                </div>

                <form method="POST" action="{{ url_for('auth.admin_login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-medium">
                            <i class="bi bi-person me-1"></i>Username
                        </label>
                        <input type="text" name="username" class="form-control form-control-lg glass-input"
                               placeholder="admin" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">
                            <i class="bi bi-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" name="password" id="adminPassword"
                                   class="form-control form-control-lg glass-input"
                                   placeholder="Enter password" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('adminPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill py-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
